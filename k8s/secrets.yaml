apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: tinyops
type: Opaque
stringData:
  POSTGRES_USER: tinyops
  POSTGRES_PASSWORD: REPLACE_WITH_STRONG_PASSWORD
  POSTGRES_DB: tinyops
---
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: tinyops
type: Opaque
stringData:
  DATABASE_URL: postgresql://tinyops:REPLACE_WITH_STRONG_PASSWORD@postgres:5432/tinyops
  SESSION_SECRET: REPLACE_WITH_RANDOM_STRING_AT_LEAST_32_CHARS
