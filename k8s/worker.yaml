apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: tinyops
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: tinyops-api:latest
          imagePullPolicy: IfNotPresent
          command: ["npm", "run", "worker:start"]
          env:
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: NODE_ENV
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: LOG_LEVEL
            - name: POLL_INTERVAL_MS
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: POLL_INTERVAL_MS
            - name: MAX_RETRIES
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: MAX_RETRIES
            - name: WORKER_CONCURRENCY
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: WORKER_CONCURRENCY
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: REDIS_URL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
