apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: tinyops
data:
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  PORT: "3000"
  COOKIE_SECURE: "false"
  RATE_LIMIT_MAX: "100"
  RATE_LIMIT_WINDOW_SECONDS: "900"
  REDIS_URL: "redis://redis:6379"
  POLL_INTERVAL_MS: "5000"
  MAX_RETRIES: "3"
  WORKER_CONCURRENCY: "5"
